name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build
        env:
          HUGO_CACHEDIR: /tmp/hugo_cache
        run: |
          hugo 2>&1 | tee hugo_build.log
          echo "---TAIZI-DEBUG-END---"

      - name: Build search index (Pagefind)
        run: |
          npx pagefind --site public --output-path public/pagefind

      - name: Restore static publications page
        run: |
          # Copy the hand-crafted publications HTML back into public/ after Hugo build
          # This overrides the Hugo-generated publications page with our custom one
          if [ -f static/publications/index.html ]; then
            cp static/publications/index.html public/publications/index.html
            echo "Static publications page restored ($(wc -c < static/publications/index.html) bytes)"
          fi

      - name: Show taizi debug file
        run: |
          if [ -f taizi_debug.txt ]; then
            echo "DEBUG FILE EXISTS:"
            cat taizi_debug.txt
          else
            echo "DEBUG FILE NOT FOUND"
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hugo-build-log
          path: hugo_build.log

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
