title: "Prof. Su Weiping"
bio: "Prof. Su Weiping (born October 1965, Jingxian, Anhui) is a Second-Level Researcher and Doctoral Supervisor at the Fujian Institute of Research on the Structure of Matter, Chinese Academy of Sciences (CAS), and a Distinguished Professor at ShanghaiTech University. He received his PhD from the Fujian Institute of Research on the Structure of Matter, CAS in 1999, and conducted postdoctoral research at Harvard University, Rutgers University, and Iowa State University from 2000 to 2005. In 2006, he joined the Fujian Institute as a group leader after being selected for the CAS Hundred Talents Program (with an outstanding completion rating). He received the National Science Fund for Distinguished Young Scholars in 2019. He was recognized as a State Council Government Special Allowance Expert in 2014, selected for the New Century National Hundred-Thousand-Ten-Thousand Talent Project in 2014, and was awarded the Fujian Provincial Hundred Talents Program for Innovation Talent in 2017. In 2017, he received the First Prize of the Fujian Provincial Natural Science Award (ranked first). Prof. Su has mentored 31 PhD students and 15 master's students, with his students receiving the CAS Best PhD Dissertation Award, the CAS President's Outstanding Award, and the National Graduate Scholarship, among others. His students have gone on to receive fellowships such as the Humboldt Fellowship and the EU Marie Curie Fellowship for further study abroad."
